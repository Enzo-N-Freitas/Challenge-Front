<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contato · BRINKS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/brinks.css">
  <link rel="stylesheet" href="../css/contato.css">
</head>
<body>

<header class="site-header">
  <a href="../index.html" class="brand">BRINKS<span>.</span></a>
  <nav class="site-nav">
    <a href="../paginas/sobre.html">Sobre</a>
    <a href="../paginas/somos.html">Equipe</a>
    <a href="../paginas/faq.html">FAQ</a>
    <a href="../paginas/contato.html" class="active">Contato</a>
  </nav>
</header>

<section class="page-hero">
  <div class="pill">Contato</div>
  <h1>Fale com o <em>BRINKS.</em></h1>
  <p>Dúvidas, sugestões ou comentários sobre o projeto? Envie uma mensagem.</p>
</section>

<main>
  <div class="block contact-wrap">
    <div class="block-label">Formulário</div>
    <h2>Envie uma Mensagem</h2>

    <div class="form-group">
      <label for="nome">Nome</label>
      <input type="text" id="nome" placeholder="Seu nome completo">
    </div>

    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com">
    </div>

    <div class="form-group">
      <label for="mensagem">Mensagem</label>
      <textarea id="mensagem" placeholder="Escreva sua mensagem..."></textarea>
    </div>

    <button class="btn btn-primary" onclick="enviar()">Enviar mensagem</button>
    <p id="msg"></p>
  </div>
</main>

<footer class="site-footer">
  Grupo <strong>BRINKS</strong> &nbsp;·&nbsp; Challenge SoulUp &nbsp;·&nbsp; 2026
</footer>

<script src="../js/contato.js"></script>

</body>
</html>
